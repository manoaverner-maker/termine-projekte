<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F3F4F7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Termine">
<title>Termine &amp; Projekte</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/logo.svg" type="image/svg+xml">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  color-scheme:light;
  --ink-900:#161A20;
  --ink-500:#6B7280;
  --ink-300:#9CA3AF;
  --paper-100:#F3F4F7;
  --paper-000:#FFFFFF;
  --line-200:#E4E7EC;
  --card-hover:#FAFAFC;
  --input-bg:#FFFFFF;
  --header-bg:rgba(243,244,247,0.92);
  --accent-start:#E3A233;
  --accent-planung:#3E7CB8;
  --accent-beschaffung:#C6875A;
  --accent-montage:#7C6FCB;
  --accent-abschluss:#8A8256;
  --signal-urgent:#D0483F;
  --signal-done:#3E9A5E;
  --urgent-bg:#FBEEEC;
  --shadow:0 1px 2px rgba(20,24,31,0.04);
  --page-bg:#E8EAF0;
  --page-shadow:0 0 60px rgba(20,24,31,0.10);
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --ink-900:#E9ECF1;
  --ink-500:#9AA3B0;
  --ink-300:#6B7686;
  --paper-100:#0E1116;
  --paper-000:#171B22;
  --line-200:#262C37;
  --card-hover:#1C212A;
  --input-bg:#10141A;
  --header-bg:rgba(14,17,22,0.88);
  --accent-start:#EAB04E;
  --accent-planung:#6AA1D8;
  --accent-beschaffung:#D89F73;
  --accent-montage:#9C92DE;
  --accent-abschluss:#ADA576;
  --signal-urgent:#E2665C;
  --signal-done:#4FB878;
  --urgent-bg:rgba(226,102,92,0.14);
  --shadow:0 1px 3px rgba(0,0,0,0.4);
  --page-bg:#090B0F;
  --page-shadow:0 0 60px rgba(0,0,0,0.55);
}
.theme-anim,.theme-anim *{transition:background-color .35s ease,color .35s ease,border-color .35s ease !important;}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--paper-100);color:var(--ink-900);-webkit-font-smoothing:antialiased;}
.app{max-width:640px;margin:0 auto;padding:0 0 60px;}
/* Desktop: Spalte als eingefasstes Panel statt verlorener Streifen */
@media (min-width: 700px){
  body{background:var(--page-bg);}
  .app{background:var(--paper-100);min-height:100vh;border-left:1px solid var(--line-200);border-right:1px solid var(--line-200);box-shadow:var(--page-shadow);}
}

/* grid-accordion helper */
.acc{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s cubic-bezier(.4,0,.2,1);}
.acc.open{grid-template-rows:1fr;}
.acc-inner{overflow:hidden;min-height:0;}
.chev{transition:transform .25s ease;color:var(--ink-300);flex:0 0 auto;}

/* Animationen */
@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.boot .home-row,.boot .project,.boot .group-label{animation:rise .5s cubic-bezier(.22,1,.36,1) backwards;animation-delay:calc(var(--i,0)*45ms);}
@keyframes pop{0%{opacity:0;transform:scale(.96) translateY(5px);}60%{transform:scale(1.012);}100%{opacity:1;transform:none;}}
.pop-in{animation:pop .4s cubic-bezier(.22,1,.36,1);}
@keyframes softpulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.overdue{animation:softpulse 2.6s ease-in-out infinite;}
.leaving{opacity:0 !important;transform:translateX(18px) !important;margin:0 !important;padding-top:0 !important;padding-bottom:0 !important;border-color:transparent !important;box-shadow:none !important;transition:all .38s cubic-bezier(.4,0,.2,1) !important;}
button{transition:transform .15s ease,color .15s ease,background .15s ease,border-color .15s ease;}
button:active{transform:scale(.94);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}

.header{position:sticky;top:0;z-index:20;background:var(--header-bg);backdrop-filter:blur(10px);padding:18px 20px 12px;border-bottom:1px solid var(--line-200);display:flex;align-items:center;gap:10px;}
.header .logo{width:34px;height:34px;flex:0 0 auto;display:block;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.18));}
.header .ht{flex:1;min-width:0;}
.header h1{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:23px;letter-spacing:-0.02em;}
.header .sub{font-size:11.5px;color:var(--ink-500);margin-top:2px;letter-spacing:0.02em;text-transform:uppercase;}
.theme-btn{background:none;border:none;cursor:pointer;color:var(--ink-500);padding:8px;border-radius:10px;display:flex;align-items:center;}
.theme-btn:hover{color:var(--ink-900);background:var(--card-hover);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--ink-300);flex:0 0 auto;transition:background .3s ease;}
.sync-dot.on{background:var(--signal-done);}
.sync-dot.syncing{background:var(--accent-start);}
.sync-dot.err{background:var(--signal-urgent);}
.sync-panel{padding:10px 20px 14px;display:flex;flex-direction:column;gap:10px;}
.sync-panel .sync-status{font-size:12px;color:var(--ink-500);}
.sync-row{display:flex;gap:8px;}
.sync-row input{flex:1;min-width:0;padding:9px 11px;border:1px solid var(--line-200);border-radius:9px;font-size:12.5px;background:var(--input-bg);color:inherit;font-family:'IBM Plex Mono',monospace;}
.sync-row button{padding:9px 14px;border-radius:9px;border:none;background:var(--ink-900);color:var(--paper-000);font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.sync-row button.secondary{background:none;border:1px solid var(--line-200);color:var(--ink-500);}

/* ===== Home / Termine section ===== */
.section-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 8px;}
.section-head h2{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;}
.link-btn{background:none;border:none;font-size:12.5px;font-weight:600;color:var(--ink-500);cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px;font-family:inherit;}
.link-btn:hover{color:var(--ink-900);}
.link-btn svg{transition:transform .25s ease;}
.link-btn.expanded svg{transform:rotate(180deg);}

.home-rows{padding:0 20px;display:flex;flex-direction:column;}
.group-label{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-300);padding:8px 2px 6px;}
.group-label.urgent{color:var(--signal-urgent);}
.home-rows>.group-label:first-child{padding-top:0;}
.home-row{
  background:var(--paper-000);border-radius:12px;padding:11px 13px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;border-left:3px solid var(--cat-color,var(--accent-planung));
  cursor:pointer;box-shadow:var(--shadow);
}
.home-row:hover{background:var(--card-hover);}
.home-row .rt{flex:1;min-width:0;}
.home-row .rt-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.home-row .rt-proj{font-size:11.5px;color:var(--ink-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.home-row .rt-count{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13.5px;flex:0 0 auto;display:flex;align-items:center;gap:4px;}
.home-row .rt-count.urgent{color:var(--signal-urgent);}
.cd-ico{opacity:.5;flex:0 0 auto;}

/* Abhaken */
.check-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line-200);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent;flex:0 0 auto;padding:0;}
.check-btn:hover{border-color:var(--signal-done);color:var(--signal-done);background:rgba(78,170,110,0.1);}
.check-btn svg path{stroke-dasharray:22;stroke-dashoffset:22;transition:stroke-dashoffset .3s ease .05s;}
.check-btn.done{border-color:var(--signal-done);background:var(--signal-done);color:#fff;}
.check-btn.done svg path{stroke-dashoffset:0;}

/* ===== Projekte section ===== */
.add-project-form{display:flex;gap:8px;padding:0 20px 4px;}
.add-project-form input{flex:1;padding:9px 11px;border:1px solid var(--line-200);border-radius:9px;font-size:13.5px;background:var(--input-bg);color:inherit;font-family:inherit;}
.add-project-form button{padding:9px 14px;border-radius:9px;border:none;background:var(--ink-900);color:var(--paper-000);font-weight:600;font-size:12.5px;cursor:pointer;font-family:inherit;}

.projects{padding:0 20px;display:flex;flex-direction:column;}
.project{background:var(--paper-000);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:10px;}
.project.closed{opacity:.65;}
.project-head{display:flex;align-items:center;gap:10px;padding:14px 15px;cursor:pointer;}
.project-head .pname{flex:1;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;overflow-wrap:anywhere;}
.project-head .pbadge{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-500);background:var(--paper-100);padding:3px 8px;border-radius:7px;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.project-head .pbadge.urgent{color:var(--signal-urgent);background:var(--urgent-bg);}

.project-body{padding:0 15px 16px;}
.block{margin-top:14px;}
.block-label{font-size:10.5px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-300);margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.info-text{width:100%;border:1px solid var(--line-200);border-radius:10px;padding:9px 10px;font-family:'Inter',sans-serif;font-size:13px;background:var(--paper-100);color:inherit;min-height:44px;resize:vertical;}
.info-text:focus{outline:2px solid var(--ink-900);outline-offset:1px;}

.termin-row{border:1px solid var(--line-200);border-left:3px solid var(--cat-color,var(--accent-planung));border-radius:10px;padding:9px 11px;margin-bottom:7px;position:relative;transition:background .15s ease;}
.termin-row:not(.archived):hover{background:var(--card-hover);}
.termin-row.archived{opacity:0.55;border-style:dashed;}
.termin-row .tr-top{display:flex;justify-content:space-between;gap:8px;}
.termin-row .tr-main{flex:1;min-width:0;}
.termin-row:not(.archived) .tr-main{cursor:pointer;}
.termin-row .tr-title{font-size:12.5px;font-weight:600;overflow-wrap:anywhere;}
.termin-row .tr-date{font-size:11px;color:var(--ink-500);margin-top:2px;}
.termin-row .tr-bem{font-size:11.5px;color:var(--ink-500);margin-top:4px;font-style:italic;overflow-wrap:anywhere;}
.termin-row .tr-side{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex:0 0 auto;}
.termin-row .tr-actions{display:flex;gap:7px;align-items:center;}
.termin-row .tr-count{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;flex:0 0 auto;display:flex;align-items:center;gap:4px;}
.termin-row .tr-count.urgent{color:var(--signal-urgent);}
.tr-extra{font-size:11.5px;color:var(--ink-500);margin-top:5px;display:flex;align-items:center;gap:5px;}
.tr-extra svg{flex:0 0 auto;opacity:.7;}
.tr-lief{font-size:11px;color:var(--ink-500);margin-top:4px;display:flex;align-items:center;gap:6px;background:var(--paper-100);border-radius:7px;padding:4px 8px;}
.tr-lief svg{flex:0 0 auto;opacity:.7;}
.tr-lief .tl-name{font-weight:600;color:var(--ink-900);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tr-lief .tl-count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-weight:600;display:flex;align-items:center;gap:3px;flex:0 0 auto;}
.tr-lief.urgent .tl-count{color:var(--signal-urgent);}
.mf-lief-row{display:flex;gap:6px;align-items:center;}
.mf-lief-row .lief-name{flex:1.3;min-width:0;}
.mf-lief-row input[type="date"],.mf-lief-row input[type="time"]{flex:1;min-width:0;}
.mf-montage{display:flex;flex-direction:column;gap:7px;padding-top:7px;border-top:1px dashed var(--line-200);margin-top:2px;}
.addr-row{display:flex;gap:7px;align-items:center;margin-bottom:8px;}
.addr-row input{flex:1;padding:8px 10px;border:1px solid var(--line-200);border-radius:9px;font-size:12.5px;background:var(--paper-100);color:inherit;font-family:inherit;}
.addr-row .icon-btn.maps:hover{color:var(--accent-planung);}
.kontakt-row{display:flex;align-items:center;gap:8px;padding:6px 2px;border-bottom:1px solid var(--line-200);font-size:12.5px;}
.kontakt-row:last-of-type{border-bottom:none;}
.kontakt-row .k-name{font-weight:600;flex:1;min-width:0;overflow-wrap:anywhere;}
.kontakt-row .k-tel{color:var(--ink-500);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:11.5px;}
.kontakt-row .icon-btn.call{color:var(--signal-done);}
.kontakt-row .icon-btn.call:hover{color:var(--signal-done);opacity:.75;}
.kform{display:flex;gap:6px;align-items:center;margin:6px 0;}
.kform input{flex:1;min-width:0;padding:8px 9px;border:1px solid var(--line-200);border-radius:8px;font-size:12.5px;background:var(--input-bg);color:inherit;font-family:inherit;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--ink-300);padding:2px;flex:0 0 auto;display:flex;align-items:center;}
.icon-btn:hover{color:var(--signal-urgent);}
.icon-btn.restore:hover{color:var(--accent-planung);}
.icon-btn.cal:hover{color:var(--accent-planung);}

.mini-add-toggle{background:var(--paper-100);border:1px dashed var(--line-200);border-radius:9px;padding:7px 10px;font-size:12px;font-weight:600;color:var(--ink-500);cursor:pointer;text-align:center;margin-bottom:8px;}
.mini-add-toggle:hover{color:var(--ink-900);}
.mini-form{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;background:var(--paper-100);padding:10px;border-radius:10px;}
.mini-form input,.mini-form select{padding:8px 9px;border:1px solid var(--line-200);border-radius:8px;font-size:12.5px;background:var(--input-bg);color:inherit;font-family:inherit;}
.mini-form .mf-row{display:flex;gap:7px;}
.mini-form .mf-row>*{flex:1;min-width:0;}
.mini-form .mf-actions{display:flex;gap:7px;}
.mini-form .mf-actions button{flex:1;padding:8px;border-radius:8px;border:none;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;}
.mf-save{background:var(--ink-900);color:var(--paper-000);}
.mf-cancel{background:var(--input-bg);color:var(--ink-500);border:1px solid var(--line-200) !important;}

.archive-toggle{font-size:11.5px;color:var(--ink-300);font-weight:600;cursor:pointer;text-align:center;padding:5px;}
.archive-toggle:hover{color:var(--ink-500);}

/* Notizen — Teams-Stil */
.notes-feed{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
.note-bubble{background:var(--paper-100);border-radius:10px;padding:8px 10px;position:relative;}
.note-bubble.deleted{opacity:0.5;}
.note-bubble .nb-meta{font-size:10px;color:var(--ink-300);font-family:'IBM Plex Mono',monospace;margin-bottom:2px;}
.note-bubble .nb-text{font-size:12.5px;line-height:1.4;padding-right:22px;overflow-wrap:anywhere;}
.note-bubble .icon-btn{position:absolute;top:7px;right:7px;}
.note-input-row{display:flex;gap:7px;}
.note-input-row input{flex:1;padding:9px 11px;border:1px solid var(--line-200);border-radius:9px;font-size:12.5px;background:var(--input-bg);color:inherit;font-family:inherit;}
.note-input-row button{padding:9px 13px;border-radius:9px;border:none;background:var(--ink-900);color:var(--paper-000);font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;}

.empty{color:var(--ink-300);font-size:12.5px;padding:6px 2px;}
.hint{margin:20px 20px 0;font-size:11.5px;color:var(--ink-300);line-height:1.5;text-align:center;}
.footer{display:flex;justify-content:center;align-items:center;gap:2px;padding:14px 20px 0;}
.footer .link-btn{font-size:11.5px;color:var(--ink-300);}
.footer .link-btn:hover{color:var(--ink-500);}

/* Desktop/Laptop: ganze App groesser darstellen (Handy unveraendert) */
@media screen and (min-width:1100px){body{zoom:1.25;}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="lg-gold" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#F2C36B"/><stop offset="1" stop-color="#D18E23"/>
        </linearGradient>
        <radialGradient id="lg-tile" cx="0.3" cy="0.22" r="1.15">
          <stop offset="0" stop-color="#242B36"/><stop offset="0.55" stop-color="#161A20"/><stop offset="1" stop-color="#0F1218"/>
        </radialGradient>
      </defs>
      <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#lg-tile)"/>
      <circle cx="32" cy="32" r="24.6" fill="none" stroke="url(#lg-gold)" stroke-width="1.4" opacity="0.55"/>
      <path d="M32 32 C 32 21.1, 39.8 14.8, 49.2 16.4 C 49.2 25.8, 41.4 32, 32 32 Z" fill="url(#lg-gold)"/>
      <path d="M32 32 C 32 21.1, 39.8 14.8, 49.2 16.4 C 49.2 25.8, 41.4 32, 32 32 Z" fill="url(#lg-gold)" transform="rotate(120 32 32)"/>
      <path d="M32 32 C 32 21.1, 39.8 14.8, 49.2 16.4 C 49.2 25.8, 41.4 32, 32 32 Z" fill="url(#lg-gold)" transform="rotate(240 32 32)"/>
      <circle cx="32" cy="32" r="4.2" fill="#161A20" stroke="url(#lg-gold)" stroke-width="2.2"/>
    </svg>
    <div class="ht">
      <h1>Termine &amp; Projekte</h1>
      <div class="sub">Lüftungsplanung · Terminübersicht</div>
    </div>
    <span class="sync-dot" id="sync-dot" title="Cloud-Sync: aus"></span>
    <button class="theme-btn" id="theme-btn" onclick="cycleTheme()" title="Design wechseln"></button>
  </div>

  <div class="section-head">
    <h2>Nächste Termine</h2>
    <button class="link-btn" id="home-toggle" onclick="toggleHome()" style="display:none;">
      <span id="home-toggle-label">Alle anzeigen</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="home-rows" id="home-top"></div>
  <div class="acc" id="home-acc"><div class="acc-inner"><div class="home-rows" id="home-more"></div></div></div>

  <div class="section-head" style="padding-top:22px;">
    <h2>Projekte</h2>
    <button class="link-btn" onclick="toggleAddProjectForm()">+ Projekt</button>
  </div>
  <div class="acc" id="add-project-acc"><div class="acc-inner">
    <div class="add-project-form">
      <input type="text" id="new-project-name" placeholder="Projektname" onkeydown="if(event.key==='Enter')addProject()">
      <button onclick="addProject()">Anlegen</button>
    </div>
  </div></div>

  <div class="projects" id="projects"></div>

  <div class="footer">
    <button class="link-btn" onclick="exportData()">Daten exportieren</button>
    <span style="color:var(--ink-300);font-size:11.5px;">·</span>
    <label class="link-btn" style="cursor:pointer;">Daten importieren<input type="file" accept=".json,application/json" style="display:none" onchange="importData(this)"></label>
    <span style="color:var(--ink-300);font-size:11.5px;">·</span>
    <button class="link-btn" onclick="toggleSyncPanel()">Cloud-Sync</button>
  </div>
  <div class="acc" id="sync-acc"><div class="acc-inner">
    <div class="sync-panel" id="sync-panel"></div>
  </div></div>
  <div class="hint">Alle Daten bleiben lokal in diesem Browser gespeichert. Import führt ein Backup mit dem aktuellen Stand zusammen — gelöscht wird nie.<br>Gelöschtes wird nur archiviert und ist jederzeit wiederherstellbar.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
'use strict';

/* ===== Konstanten & Zustand ===== */
const LS_KEY = 'termine_v1';
const THEME_KEY = 'termine_theme';
const CATS = {
  start:{label:'Start / Klärung',color:'var(--accent-start)'},
  planung:{label:'Planung',color:'var(--accent-planung)'},
  beschaffung:{label:'Beschaffung',color:'var(--accent-beschaffung)'},
  montage:{label:'Montage',color:'var(--accent-montage)'},
  abschluss:{label:'Abschluss',color:'var(--accent-abschluss)'},
};
const catOf = k => CATS[k] || CATS.planung;
const GROUPS = {overdue:'Überfällig', today:'Heute', tomorrow:'Morgen', later:'Später'};

// Ansichts-Zustand (nicht persistiert)
const ui = {
  homeExpanded:false,
  open:new Set(),        // aufgeklappte Projekte
  archOpen:new Set(),    // Projekte mit sichtbaren archivierten Terminen
  delOpen:new Set(),     // Projekte mit sichtbaren gelöschten Notizen
  showAddProject:false,

/* ===== Persistenz (nie destruktiv) ===== */
function load(){
  let raw = null;
  try { raw = localStorage.getItem(LS_KEY); } catch(e){}
  if (!raw) return {v:1, projects:[]};
  try {
    const d = JSON.parse(raw);
    if (!d || !Array.isArray(d.projects)) throw new Error('unerwartetes Format');
    return d;
  } catch(e) {
    // Defekten Stand sichern statt überschreiben
    try { localStorage.setItem(LS_KEY + '_defekt_' + Date.now(), raw); } catch(_){}
    return {v:1, projects:[]};
  }
}
let data = load();
let saveTimer = null;
function save(){ try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e){} }
function saveSoon(){ clearTimeout(saveTimer); saveTimer = setTimeout(()=>{ saveTimer = null; save(); }, 400); pushRemoteSoon(); }

/* ===== Cloud-Sync (Supabase, optional) =====
   Solange SUPABASE_URL/SUPABASE_ANON_KEY Platzhalter sind, bleibt sb=null und die App
   verhaelt sich exakt wie vorher (rein lokal). Sobald echte Werte eingetragen sind,
   aktiviert sich der Sync automatisch — kein weiterer Codeeingriff noetig. */
const SUPABASE_URL = 'https://YOUR-PROJECT.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR-ANON-KEY';
const SYNC_KEY = 'termine_sync_code';
let syncCode = (()=>{ try { return localStorage.getItem(SYNC_KEY) || ''; } catch(e){ return ''; } })();
let sb = null;
try {
  if (SUPABASE_URL.indexOf('YOUR-PROJECT') === -1 && window.supabase) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
} catch(e){}
let syncChannel = null;
let pushTimer = null;

function setSyncDot(state){
  const d = document.getElementById('sync-dot');
  if (!d) return;
  d.className = 'sync-dot' + (state ? ' ' + state : '');
  const titles = {off:'Cloud-Sync: aus', on:'Cloud-Sync: aktiv', syncing:'Sync läuft…', err:'Sync-Fehler (Daten bleiben lokal erhalten)'};
  d.title = titles[state || 'off'];
}

async function pullRemote(){
  if (!sb || !syncCode) return;
  setSyncDot('syncing');
  try {
    const { data: row, error } = await sb.from('termine_sync').select('data,updated_at').eq('id', syncCode).maybeSingle();
    if (error) throw error;
    if (row && row.data) { data = mergeData(data, row.data); save(); render(); }
    setSyncDot('on');
  } catch(e){ setSyncDot('err'); }
}
async function pushRemote(){
  if (!sb || !syncCode) return;
  setSyncDot('syncing');
  try {
    const { error } = await sb.from('termine_sync').upsert({ id: syncCode, data, updated_at: new Date().toISOString() });
    if (error) throw error;
    setSyncDot('on');
  } catch(e){ setSyncDot('err'); }
}
function pushRemoteSoon(){
  if (!sb || !syncCode) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(()=>{ pushTimer = null; pushRemote(); }, 600);
}
function subscribeRealtime(){
  if (!sb || !syncCode) return;
  if (syncChannel) { try { sb.removeChannel(syncChannel); } catch(e){} syncChannel = null; }
  syncChannel = sb.channel('termine-sync-' + syncCode)
    .on('postgres_changes', { event:'*', schema:'public', table:'termine_sync', filter:'id=eq.' + syncCode }, payload => {
      const remote = payload.new && payload.new.data;
      if (remote) { data = mergeData(data, remote); save(); render(); }
    })
    .subscribe();
}
function startSync(){
  if (!sb || !syncCode) { setSyncDot('off'); return; }
  pullRemote().then(subscribeRealtime);
}
function generateSyncCode(){
  const code = (crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2))).replace(/-/g, '');
  syncCode = code;
  try { localStorage.setItem(SYNC_KEY, code); } catch(e){}
  renderSyncPanel();
  startSync();
  pushRemote();
}
function connectSyncCode(input){
  const val = (input.value || '').trim();
  if (!val) return;
  syncCode = val;
  try { localStorage.setItem(SYNC_KEY, val); } catch(e){}
  renderSyncPanel();
  startSync();
}
function disconnectSync(){
  if (!confirm('Cloud-Sync trennen? Deine lokalen Daten bleiben erhalten, werden aber nicht mehr mit anderen Geräten abgeglichen.')) return;
  try { localStorage.removeItem(SYNC_KEY); } catch(e){}
  if (syncChannel) { try { sb.removeChannel(syncChannel); } catch(e){} syncChannel = null; }
  syncCode = '';
  setSyncDot('off');
  renderSyncPanel();
}
function toggleSyncPanel(){ document.getElementById('sync-acc').classList.toggle('open'); }
function renderSyncPanel(){
  const el = document.getElementById('sync-panel');
  if (!el) return;
  if (!sb) {
    el.innerHTML = '<div class="sync-status">Cloud-Sync ist in dieser Version noch nicht eingerichtet.</div>';
    return;
  }
  if (!syncCode) {
    el.innerHTML =
      '<div class="sync-status">Noch nicht verbunden — auf jedem Gerät denselben Code hinterlegen.</div>' +
      '<div class="sync-row"><button onclick="generateSyncCode()">Neuen Code erzeugen</button></div>' +
      '<div class="sync-row"><input type="text" id="sync-code-input" placeholder="Code von anderem Gerät einfügen">' +
      '<button class="secondary" onclick="connectSyncCode(document.getElementById(\'sync-code-input\'))">Verbinden</button></div>';
  } else {
    el.innerHTML =
      '<div class="sync-status">Cloud-Sync aktiv — Code fürs nächste Gerät:</div>' +
      '<div class="sync-row"><input type="text" readonly value="' + esc(syncCode) + '" onclick="this.select()">' +
      '<button class="secondary" onclick="navigator.clipboard && navigator.clipboard.writeText(\'' + esc(syncCode) + '\')">Kopieren</button></div>' +
      '<div class="sync-row"><button class="secondary" onclick="disconnectSync()">Sync trennen</button></div>';
  }
}

/* ===== Zeit & Countdown ===== */
function readout(dateStr){
  const ms = new Date(dateStr) - Date.now();
  if (ms < 0) return {text:'Überfällig', urgent:true, overdue:true};
  const days  = Math.floor(ms / 86400000);
  const hours = Math.floor((ms % 86400000) / 3600000);
  const mins  = Math.floor((ms % 3600000) / 60000);
  const secs  = Math.floor((ms % 60000) / 1000);
  const hms = `${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  if (days >= 1) return {text:`${days}T ${hms}`, urgent:false, overdue:false};
  return {text:hms, urgent:true, overdue:false};
}
// Stoppuhr-Symbol vor jedem Countdown — macht den Live-Timer als solchen erkennbar
const CLOCK_SVG = '<svg class="cd-ico" width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M9.5 2h5M12 2v4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><circle cx="12" cy="14.5" r="7.5" stroke="currentColor" stroke-width="2.2"/><path d="M12 14.5l3-2.6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>';
function groupOf(dateStr){
  const now = new Date(), d = new Date(dateStr);
  if (d < now) return 'overdue';
  const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const startDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diffDays = Math.round((startDay - startToday) / 86400000);
  if (diffDays <= 0) return 'today';
  if (diffDays === 1) return 'tomorrow';
  return 'later';
}
function fmtDate(dateStr){
  const d = new Date(dateStr), tage = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  return `${tage[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtNoteDate(dateStr){
  const d = new Date(dateStr);
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// Sekündlich: nur Countdown-Texte nachführen (kein DOM-Neuaufbau).

function updateCounts(){
  document.querySelectorAll('[data-count]').forEach(el => {

    host.classList.toggle('urgent', r.urgent);
    host.classList.toggle('overdue', r.overdue);

}

/* ===== Animations-Helfer ===== */
function collapseOut(el, cb){
  el.style.height = el.offsetHeight + 'px';
  el.style.overflow = 'hidden';
  void el.offsetHeight; // Reflow, damit die Start-Höhe greift
  el.classList.add('leaving');
  el.style.height = '0px';
  setTimeout(cb, 400);
}
function popIn(selector){

}

  const all = allActiveTermine();

  // Aufteilen: die ersten 4 Zeilen (inkl. zugehöriger Titel) oben, Rest ins Accordion
  let i = 0, rowCount = 0;
  for (; i < items.length && rowCount < 4; i++) if (items[i].row) rowCount++;

const WRENCH_SVG = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M14.7 6.3a4.5 4.5 0 0 0-6 5.6L3 17.6V21h3.4l5.7-5.7a4.5 4.5 0 0 0 5.6-6L14.5 12.5l-3-3 3.2-3.2z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const TRUCK_SVG = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M1.5 5.5h12v11h-12zM13.5 9h4.5l3 3.5v4h-7.5" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/><circle cx="6" cy="18.5" r="1.9" stroke="currentColor" stroke-width="1.7"/><circle cx="17.5" cy="18.5" r="1.9" stroke="currentColor" stroke-width="1.7"/></svg>';

function terminRowHtml(pid, t, isArchived){
  const r = readout(t.datum);
  const liefs = t.lieferungen || [];

        ${t.monteur ? `<div class="tr-extra">${WRENCH_SVG}Monteur: ${esc(t.monteur)}</div>` : ''}
        ${liefs.map(l => {
          const lr = readout(l.datum);
          return `<div class="tr-lief ${lr.urgent?'urgent':''} ${lr.overdue?'overdue':''}">${TRUCK_SVG}<span class="tl-name">${esc(l.lieferant)}</span><span>${fmtDate(l.datum)}</span><span class="tl-count">${CLOCK_SVG}<span data-count="${esc(l.datum)}">${lr.text}</span></span></div>`;

        ${isArchived
          ? `<button class="icon-btn restore" onclick="restoreTermin('${pid}','${t.id}')" title="Wiederherstellen"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 1 1 3 6.7M3 12V6m0 6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>`
          : `<div class="tr-actions">

            </div>`}

function openMiniForm(pid, tid){
  const t = tid ? proj(pid).termine.find(x => x.id === tid) : null;

  const dateVal = t ? t.datum.slice(0,10) : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const timeVal = t ? t.datum.slice(11,16) : '08:00';
  const holder = document.getElementById('mform-'+pid);
  holder.innerHTML = `<div class="acc" id="mfacc-${pid}"><div class="acc-inner"><div class="mini-form">
    <div class="block-label" style="margin-bottom:0;">${t ? 'Termin bearbeiten' : 'Neuer Termin'}</div>
    <input type="text" id="mf-titel-${pid}" placeholder="Bezeichnung" value="${t ? esc(t.titel) : ''}" onkeydown="if(event.key==='Enter')saveTermin('${pid}','${tid||''}')">
    <div class="mf-row">
      <select id="mf-kat-${pid}" onchange="mfKatChanged('${pid}')">${Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${t && t.kat===k ? 'selected' : ''}>${v.label}</option>`).join('')}</select>
      <input type="date" id="mf-datum-${pid}" value="${dateVal}">
      <input type="time" id="mf-zeit-${pid}" value="${timeVal}">
    </div>
    <input type="text" id="mf-bem-${pid}" placeholder="Bemerkung (optional)" value="${t ? esc(t.bem) : ''}">
    <div class="acc" id="mf-montage-acc-${pid}"><div class="acc-inner"><div class="mf-montage">
      <input type="text" id="mf-monteur-${pid}" placeholder="Monteur (wer montiert?)" value="${t && t.monteur ? esc(t.monteur) : ''}">
      <div class="block-label" style="margin-bottom:0;">Lieferungen</div>
      <div id="mf-lief-list-${pid}" style="display:flex;flex-direction:column;gap:6px;"></div>
      <div class="mini-add-toggle" style="margin-bottom:0;" onclick="addLiefRow('${pid}')">+ Lieferung hinzufügen</div>
    </div></div></div>
    <div class="mf-actions">
      <button class="mf-cancel" onclick="closeMiniForm('${pid}')">Abbrechen</button>
      <button class="mf-save" onclick="saveTermin('${pid}','${tid||''}')">Speichern</button>
    </div>
  </div></div></div>`;
  (t && t.lieferungen ? t.lieferungen : []).forEach(l => addLiefRow(pid, l));

    document.getElementById('mfacc-'+pid)?.classList.add('open');
    if (document.getElementById('mf-kat-'+pid)) mfKatChanged(pid);
  }, 20);

function addLiefRow(pid, l){
  const list = document.getElementById('mf-lief-list-'+pid);

  openMiniForm(pid, tid);
  document.getElementById('mform-'+pid).scrollIntoView({behavior:'smooth', block:'nearest'});
}
function closeMiniForm(pid){
  const acc = document.getElementById('mfacc-'+pid);
  if (!acc){ document.getElementById('mform-'+pid).innerHTML = ''; return; }
  acc.classList.remove('open');
  setTimeout(()=>{ document.getElementById('mform-'+pid).innerHTML = ''; }, 360);
}
function saveTermin(pid, tid){
  const titel = document.getElementById(`mf-titel-${pid}`).value.trim();
  const kat   = document.getElementById(`mf-kat-${pid}`).value;
  const datum = document.getElementById(`mf-datum-${pid}`).value;
  const zeit  = document.getElementById(`mf-zeit-${pid}`).value || '08:00';
  const bem   = document.getElementById(`mf-bem-${pid}`).value.trim();
  if (!titel || !datum){ alert('Bitte Bezeichnung und Datum ausfüllen.'); return; }
  // Montage-Zusatz: Monteur + Lieferungen (nur bei Terminart Montage)
  const isMontage = kat === 'montage';
  const monteur = isMontage ? document.getElementById('mf-monteur-'+pid).value.trim() : '';
  const lieferungen = [];
  if (isMontage){
    document.querySelectorAll('#mf-lief-list-'+pid+' .mf-lief-row').forEach(row => {
      const name = row.querySelector('.lief-name').value.trim();
      const ld = row.querySelector('.lief-datum').value;
      const lz = row.querySelector('.lief-zeit').value || '07:00';
      if (name && ld) lieferungen.push({id:newId('l'), lieferant:name, datum:`${ld}T${lz}:00`});
    });
  }
  let id = tid;
  if (tid){
    const t = proj(pid).termine.find(x => x.id === tid);
    Object.assign(t, {titel, kat, datum:`${datum}T${zeit}:00`, bem, monteur, lieferungen, mtime:Date.now()});
  } else {
    id = newId('t');
    proj(pid).termine.push({id, titel, kat, datum:`${datum}T${zeit}:00`, bem, monteur, lieferungen, archived:false, mtime:Date.now()});
  }
  save(); render();
  popIn(`[data-tid="${id}"]`);
}
function completeTermin(btn, pid, tid){
  if (btn.dataset.busy) return;
  btn.dataset.busy = '1';
  btn.classList.add('done');
  const row = btn.closest('.home-row, .termin-row');
  const finish = ()=>{
    const t = proj(pid).termine.find(x => x.id === tid);
    t.archived = true; t.mtime = Date.now();
    save(); render();
  };
  if (row) setTimeout(()=>collapseOut(row, finish), 260); else finish();
}
function restoreTermin(pid, tid){
  const t = proj(pid).termine.find(x => x.id === tid);
  t.archived = false; t.mtime = Date.now();
  save(); render();
  popIn(`[data-tid="${tid}"]`);
}

/* ===== Kalender-Export (.ics) ===== */
function icsEscape(s){
  return String(s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n');
}
function buildIcs(t, projName){
  const p2 = n => String(n).padStart(2,'0');
  const loc = d => `${d.getFullYear()}${p2(d.getMonth()+1)}${p2(d.getDate())}T${p2(d.getHours())}${p2(d.getMinutes())}00`;
  const s = new Date();
  const stamp = `${s.getUTCFullYear()}${p2(s.getUTCMonth()+1)}${p2(s.getUTCDate())}T${p2(s.getUTCHours())}${p2(s.getUTCMinutes())}${p2(s.getUTCSeconds())}Z`;
  const desc = [
    projName,
    t.bem,
    t.monteur ? 'Monteur: ' + t.monteur : '',
    ...(t.lieferungen || []).map(l => 'Lieferung ' + l.lieferant + ': ' + fmtDate(l.datum)),
  ].filter(Boolean).join('\n');
  return [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Termine und Projekte//DE','CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:${t.id}@termine-projekte`,
    `DTSTAMP:${stamp}`,
    `DTSTART:${loc(new Date(t.datum))}`,
    'DURATION:PT1H',
    `SUMMARY:${icsEscape(t.titel)} (${icsEscape(projName)})`,
    desc ? `DESCRIPTION:${icsEscape(desc)}` : '',
    'BEGIN:VALARM','ACTION:DISPLAY',`DESCRIPTION:${icsEscape(t.titel)}`,'TRIGGER:-P1D','END:VALARM',
    'BEGIN:VALARM','ACTION:DISPLAY',`DESCRIPTION:${icsEscape(t.titel)}`,'TRIGGER:-PT1H','END:VALARM',
    'END:VEVENT','END:VCALENDAR',
  ].filter(Boolean).join('\r\n');
}
function exportIcs(pid, tid){
  const p = proj(pid), t = p.termine.find(x => x.id === tid);
  const blob = new Blob([buildIcs(t, p.name)], {type:'text/calendar;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const slug = t.titel.toLowerCase().replace(/[^a-z0-9äöüéèà]+/gi,'-').replace(/^-+|-+$/g,'').slice(0,40) || 'termin';
  a.download = `termin-${slug}.ics`;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ===== Backup: Export / Import (Merge) ===== */
function exportData(){
  if (saveTimer){ clearTimeout(saveTimer); saveTimer = null; save(); }
  const d = new Date();
  const name = `termine-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}
// Union per id; bei Konflikt gewinnt der Eintrag mit neuerem mtime (ohne mtime gewinnt lokal)
function mergeItems(localArr, impArr){
  const out = localArr.map(x => ({...x}));
  const idx = {};
  out.forEach((x, i) => { idx[x.id] = i; });
  for (const item of impArr){
    if (idx[item.id] !== undefined){
      if ((item.mtime || 0) > (out[idx[item.id]].mtime || 0)) out[idx[item.id]] = {...item};
    } else out.push({...item});
  }
  return out;
}
function mergeData(local, imp){
  const localMap = {}, impMap = {};
  local.projects.forEach(p => { localMap[p.id] = p; });
  imp.projects.forEach(p => { impMap[p.id] = p; });
  const ids = [...local.projects.map(p => p.id), ...imp.projects.filter(p => !localMap[p.id]).map(p => p.id)];
  return {v:1, projects: ids.map(id => {
    const L = localMap[id], I = impMap[id];
    if (!L || !I) return L || I;
    const newer = (I.mtime || 0) > (L.mtime || 0) ? I : L;
    return {
      id,
      name: newer.name, info: newer.info, closed: !!newer.closed,
      adresse: newer.adresse || '',
      mtime: Math.max(L.mtime || 0, I.mtime || 0),
      termine: mergeItems(L.termine || [], I.termine || []),
      notes: mergeItems(L.notes || [], I.notes || []),
      kontakte: mergeItems(L.kontakte || [], I.kontakte || []),
    };
  })};
}
function importData(input){
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const d = JSON.parse(reader.result);
      if (!d || !Array.isArray(d.projects)) throw new Error('unerwartetes Format');
      if (!confirm('Backup wird mit den aktuellen Daten zusammengeführt — bei Konflikten gewinnt der neuere Stand, gelöscht wird nichts. Fortfahren?')){ input.value=''; return; }
      try { localStorage.setItem(LS_KEY + '_vor_import_' + Date.now(), JSON.stringify(data)); } catch(_){}
      data = mergeData(data, d);
      save(); render();
    } catch(e) {
      alert('Datei konnte nicht gelesen werden – kein gültiges Backup.');
    }
    input.value = '';
  };
  reader.readAsText(file);
}
